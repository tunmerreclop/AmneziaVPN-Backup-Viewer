<style>

body { font-family: var(--font); background: var(--bg-3); color: var(--text); min-height: 100vh; transition: background .2s, color .2s; }

.wrap { max-width: 1280px; margin: 0 auto; padding: 2rem 1rem 4rem; }

.err-box {

.files-bar-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: .6rem; }

.div { height: 1px; background: var(--bd); margin: .7rem 0; }

.warn-block { font-size: 12px; background: var(--warn-bg); border: 1px solid var(--warn-bd); color: var(--warn); border-radius: var(--r-md); padding: .5rem .7rem; line-height: 1.5; margin-bottom: .5rem; }

.r-tabs { display: flex; gap: 4px; margin-bottom: .75rem; }

.r-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

.btt-btn {

</style>

const dz=document.getElementById('dz'),fi=document.getElementById('fi');
const errEl=document.getElementById('error'),resEl=document.getElementById('results');

dz.addEventListener('click',()=>fi.click());
fi.addEventListener('change',()=>{if(fi.files.length)handleFiles(fi.files);});
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('over');});
dz.addEventListener('dragleave',()=>dz.classList.remove('over'));

function handleFiles(files){
  let pending=files.length;
  for(const f of files){
    const r=new FileReader();
    r.onload=e=>{
      try{ingest(JSON.parse(e.target.result),f.name);}
      catch(ex){showErr('JSON ошибка ('+f.name+'): '+ex.message);}
      if(--pending===0)render();
    };
    r.readAsText(f);
  }
}

function ingest(data,filename){
  const platform=(data['AppPlatform']||'').toLowerCase();
  const conf={
    platform,
    primaryDns:  data['Conf/primaryDns']  ||'1.1.1.1',
    secondaryDns:data['Conf/secondaryDns']||'1.0.0.1',
    routeMode:   data['Conf/routeMode'],
    appsRouteMode:data['Conf/appsRouteMode'],
    appsSplit:   data['Conf/appsSplitTunnelingEnabled'],
    sitesSplit:  data['Conf/sitesSplitTunnelingEnabled'],
    killSwitch:  data['Conf/killSwitchEnabled'],
    autoConnect: data['Conf/autoConnect'],
    useAmneziaDns:data['Conf/useAmneziaDns'],
    exceptApps:  plo(data['Conf/ExceptApps'], []),
    forwardApps: plo(data['Conf/ForwardApps'],[]),
    exceptSites: plo(data['Conf/ExceptSites'],{}),
    forwardSites:plo(data['Conf/ForwardSites'],{}),
  };
  let servers;
  try{const r=data['Servers/serversList'];servers=typeof r==='string'?JSON.parse(r):(r||[]);}
  catch(e){servers=[];}
  
  let rawCount=0, added=0;
  for(const srv of servers){
    if(!hasCont(srv))continue;
    rawCount++;
    const k=srvKey(srv);
    if(seenHosts.has(k))continue;
    seenHosts.add(k);
    srv.__conf=conf;
    srv.__file=filename;
    allServers.push(srv);
    added++;
  }
  loadedConfs.push({filename,conf,platform,rawCount});
}

function plo(v,def){if(!v)return def;if(typeof v==='string'){try{return JSON.parse(v);}catch(e){return def;}}return v;}
function srvKey(srv){return String(srv.hostName||srv.description||srv.name||'').trim();}
function hasCont(srv){return(srv.containers||[]).some(c=>CORD.includes(c.container));}

function render(){
  if(!allServers.length){showErr('Поддерживаемых серверов не найдено или резервная копия повреждена.');return;}
  errEl.style.display='none';

  const fbar=document.getElementById('files-bar'),fgrid=document.getElementById('files-grid');
  fbar.style.display='block';
  fgrid.innerHTML=loadedConfs.map((fc,i)=>
    `<button class="file-chip" onclick="showRoutingModal(${i})" title="${esc(fc.filename)}">
      <div class="fc-name">${esc(fc.filename)}</div>
      <div class="fc-meta">${fc.rawCount} серв. · ${esc(fc.platform||'?')}</div>
    </button>`
  ).join('');

  const groups=groupServers();
  const multiFile=loadedConfs.length>1;
  const vlessCount=allServers.filter(s=>(s.containers||[]).some(c=>c.container==='amnezia-xray')).length;

  let html=`<div class="res-hd">
    <span class="slabel">Уникальных серверов: ${allServers.length}</span>
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      ${vlessCount?`<button class="btn pr" onclick="exportAllVless()">Экспорт VLESS (${vlessCount})</button>`:''}
    </div>
  </div><div class="cards-grid">`;

  for(const g of groups)
    html+=g.type==='sub'&&g.srvList.length>1?renderMergedCard(g,multiFile):renderCard(g.srvList[0],multiFile);

  html+='</div>';
  resEl.innerHTML=html;
  resEl.style.display='block';
}

function groupServers(){
  const out=[],byKey={};
  for(const srv of allServers){
    const vk=(srv.api_config||{}).vpn_key;
    if(vk){
      if(!byKey[vk]){byKey[vk]={type:'sub',vpnKey:vk,srvList:[]};out.push(byKey[vk]);}
      byKey[vk].srvList.push(srv);
    }else{
      out.push({type:'single',srvList:[srv]});
    }
  }
  
  // Дедупликация одинаковых локаций в подписке (даже если они из разных файлов)
  for(const g of out){
    if(g.type==='sub'){
      const locMap=new Map();
      for(const s of g.srvList){
        const sApi=s.api_config||{};
        const cName=sApi.server_country_name?stripEmoji(sApi.server_country_name):(s.name||s.description||s.hostName||'Unknown');
        if(!locMap.has(cName)){
          const ms=Object.assign({},s);
          ms.containers=[...(s.containers||[])];
          ms.__files=new Set([s.__file]);
          locMap.set(cName,ms);
        }else{
          const ex=locMap.get(cName);
          if(s.__file) ex.__files.add(s.__file);
          const ep=new Set(ex.containers.map(c=>c.container));
          for(const c of(s.containers||[])){
            if(!ep.has(c.container)){ex.containers.push(c);ep.add(c.container);}
          }
        }
      }
      g.srvList=Array.from(locMap.values());
    }
  }
  return out;
}

function renderCard(srv,multiFile){
  const api=srv.api_config||{},sub=api.subscription||{},isSub=!!api.vpn_key,host=srv.hostName||'';
  const endDate=sub.end_date?fmtDate(sub.end_date):null;
  const name=srv.name||srv.description||host||'Сервер';

  let h='<div class="server-card">';
  h+=`<div class="card-top"><div class="srv-name">${esc(name)}</div>${multiFile?`<span class="src-badge">${esc(trimFn(srv.__file||''))}</span>`:''}</div>`;
  h+='<div class="tag-row">';
  if(api.server_country_name)h+=`<span class="tag a">${flag(api.server_country_code)} ${esc(stripEmoji(api.server_country_name))}</span>`;
  if(!isSub&&api.service_type)h+=`<span class="tag">${esc(api.service_type)}</span>`;
  h+='</div>';
  
  h+='<div class="card-scroll-area">';
  h+='<div class="igrid">';
  if(host)h+=`<span class="k">Хост</span><span class="v">${esc(host)}</span>`;
  if(endDate)h+=`<span class="k">Подписка до</span><span class="v ok">${endDate}</span>`;
  h+='</div>';
  h+=renderContTabs(srv,isSub);
  h+='</div>';
  
  h+=renderSubFooter(api);
  h+='</div>';
  return h;
}

function renderMergedCard(g,multiFile){
  const ref=g.srvList[0],api=ref.api_config||{},sub=api.subscription||{};
  const endDate=sub.end_date?fmtDate(sub.end_date):null;

  let h='<div class="server-card">';
  h+=`<div class="card-top"><div class="srv-name">Подписка · ${g.srvList.length} локаций</div><span class="src-badge">${g.srvList.length} серв.</span></div>`;
  
  h+='<div class="card-scroll-area">';
  if(endDate)h+=`<div class="igrid" style="margin-bottom:0"><span class="k">Подписка до</span><span class="v ok">${endDate}</span></div>`;
  h+='<div class="div"></div><div class="srv-tabs">';

  g.srvList.forEach((srv,i)=>{
    const sApi = srv.api_config || {};
    const cName = sApi.server_country_name ? stripEmoji(sApi.server_country_name) : (srv.name||srv.description||srv.hostName||`#${i+1}`);
    const f = flag(sApi.server_country_code);
    const lbl = (f ? f + ' ' : '') + cName;
    const displayLbl = lbl.length>26 ? lbl.slice(0,25)+'…' : lbl;

    const pid=uid();
    srv.__mtid=pid;
    h+=`<button class="srv-tab${i===0?' act':''}" onclick="switchSrvTab(this,'${pid}')">${esc(displayLbl)}</button>`;
  });
  h+='</div>';

  g.srvList.forEach((srv,i)=>{
    h+=`<div class="srv-panel${i===0?' act':''}" id="${srv.__mtid}">`;
    if(multiFile){
      const fnames=Array.from(srv.__files||[srv.__file]).map(f=>esc(trimFn(f||''))).join(', ');
      h+=`<div style="margin-bottom:.5rem"><span class="src-badge">${fnames}</span></div>`;
    }
    h+=renderContTabs(srv,true);
    h+='</div>';
  });
  h+='</div>';

  h+=renderSubFooter(api);
  h+='</div>';
  return h;
}

function renderContTabs(srv,isSub){
  const containers=(srv.containers||[]).filter(c=>CORD.includes(c.container)).sort((a,b)=>CORD.indexOf(a.container)-CORD.indexOf(b.container));
  if(!containers.length)return '';
  let h='<div class="div"></div><div class="pt-tabs">';
  containers.forEach((c,i)=>{
    const pid=uid();c.__pid=pid;
    h+=`<button class="pt-tab${i===0?' act':''}" onclick="switchPtTab(this,'${pid}')">${CLABEL[c.container]||c.container}</button>`;
  });
  h+='</div>';
  containers.forEach((c,i)=>{
    h+=`<div class="pt-panel${i===0?' act':''}" id="${c.__pid}">${renderContainer(srv,c,isSub)}</div>`;
  });
  return h;
}

function renderContainer(srv,c,isSub){
  switch(c.container){
    case 'amnezia-xray':          return renderXray(srv,c,isSub);
    case 'amnezia-awg':case 'amnezia-awg2': return renderAwg(srv,c);
    case 'amnezia-wireguard':     return renderWg(srv,c);

    case 'amnezia-openvpn-cloak': return renderCloak(srv,c);

function renderXray(srv,c,isSub){
  let cfg=null;try{cfg=JSON.parse((c.xray||{}).last_config);}catch(e){}
  const uri=cfg?buildVlessUri(cfg,srv,isSub):null;
  const par=cfg?extractVlessParams(cfg):null;
  if(!uri)return'<div class="warn-block">Нет last_config для VLESS URI</div>';
  const safe=uri.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  let h=`<div class="act-row">
    <button class="btn" onclick="copyStr('${safe}','VLESS URI')">Копировать URI</button>
    ${eyeBtn('VLESS URI',safe)}
    <button class="btn" onclick="dlStr('vless.txt','${safe}')">Скачать .txt</button>
  </div>`;
  if(par){
    h+='<div class="sublabel">Параметры</div><div class="igrid">';
    if(par.uuid)h+=`<span class="k">UUID</span><span class="v">${esc(par.uuid)}</span>`;
    if(par.address)h+=`<span class="k">Адрес</span><span class="v">${esc(par.address)}:${esc(String(par.port))}</span>`;
    if(par.network)h+=`<span class="k">Network</span><span class="v">${esc(par.network)}</span>`;
    if(par.security)h+=`<span class="k">Security</span><span class="v">${esc(par.security)}</span>`;
    if(par.sni)h+=`<span class="k">SNI</span><span class="v">${esc(par.sni)}</span>`;
    if(par.pbk)h+=`<span class="k">PublicKey</span><span class="v">${esc(par.pbk)}</span>`;
    if(par.fp)h+=`<span class="k">Fingerprint</span><span class="v">${esc(par.fp)}</span>`;

    if(par.flow)h+=`<span class="k">Flow</span><span class="v">${esc(par.flow)}</span>`;
    h+='</div>';
  }
  return h;

function buildVlessUri(cfg,srv,isSub){
  try{
    const out=cfg.outbounds.find(o=>o.protocol==='vless');if(!out)return null;
    const vn=out.settings.vnext[0],u=vn.users[0],ss=out.streamSettings||{},rs=ss.realitySettings||{};
    const p=new URLSearchParams();
    if(ss.network)p.set('type',ss.network);if(ss.security)p.set('security',ss.security);
    if(rs.serverName)p.set('sni',rs.serverName);if(rs.publicKey)p.set('pbk',rs.publicKey);
    if(rs.fingerprint)p.set('fp',rs.fingerprint);if(rs.shortId)p.set('sid',rs.shortId);
    if(rs.spiderX)p.set('spx',rs.spiderX);if(u.flow)p.set('flow',u.flow);
    const api=srv.api_config||{};
    const tag=isSub&&api.server_country_code?flag(api.server_country_code)+' '+stripEmoji(api.server_country_name||''):srv.name||srv.description||vn.address;
    return'vless://'+u.id+'@'+vn.address+':'+vn.port+'?'+p.toString()+'#'+encodeURIComponent(tag);
  }catch(e){return null;}
}

function extractVlessParams(cfg){
  try{
    const out=cfg.outbounds.find(o=>o.protocol==='vless');
    const vn=out.settings.vnext[0],u=vn.users[0],ss=out.streamSettings||{},rs=ss.realitySettings||{};
    return{uuid:u.id,address:vn.address,port:vn.port,flow:u.flow,network:ss.network,security:ss.security,sni:rs.serverName,pbk:rs.publicKey,fp:rs.fingerprint,shortId:rs.shortId};
  }catch(e){return null;}
}

  let h='<div class="igrid">';
  if(srv.hostName)h+=`<span class="k">Хост</span><span class="v">${esc(srv.hostName)}</span>`;
  if(ss.port)h+=`<span class="k">Порт</span><span class="v">${esc(String(ss.port))}</span>`;
  if(ss.transport_proto)h+=`<span class="k">Протокол</span><span class="v">${esc(ss.transport_proto)}</span>`;
  h+='</div><div class="info-block">Метод и пароль не хранятся в бэкапе. Шаблон: <code>ss://METHOD:PASS@'+esc(srv.hostName||'HOST')+':'+(ss.port||'PORT')+'</code></div>';
  return h;
}

function renderSocks5(srv,c){
  const sp=c.socks5proxy||{},host=srv.hostName||'',port=sp.port||'',user=sp.userName||'',pass=sp.password||'';
  let h='';
  if(host&&port){
    const uri=`socks5://${encodeURIComponent(user)}:${encodeURIComponent(pass)}@${host}:${port}`;
    const safe=uri.replace(/'/g,"\\'");
    h+=`<div class="act-row">
      <button class="btn" onclick="copyStr('${safe}','SOCKS5 URI')">Копировать URI</button>
      ${eyeBtn('SOCKS5 URI',safe)}
    </div>`;
  }
  h+='<div class="igrid">';
  if(host)h+=`<span class="k">Хост</span><span class="v">${esc(host)}</span>`;
  if(port)h+=`<span class="k">Порт</span><span class="v">${esc(String(port))}</span>`;
  if(user)h+=`<span class="k">Логин</span><span class="v">${esc(user)}</span>`;
  if(pass)h+=`<span class="k">Пароль</span><span class="v blur" onclick="this.classList.toggle('show-pwd')" title="Нажмите, чтобы показать/скрыть">${esc(pass)}</span>`;
  h+='</div>';
  return h;
}

function renderIpsec(srv,c){
  const ik=c.ikev2||{};
  let h='<div class="igrid">';
  if(srv.hostName)h+=`<span class="k">Хост</span><span class="v">${esc(srv.hostName)}</span>`;
  if(ik.port&&ik.port!==0)h+=`<span class="k">Порт</span><span class="v">${esc(String(ik.port))}</span>`;
  if(ik.subnet_address)h+=`<span class="k">Подсеть</span><span class="v">${esc(ik.subnet_address)}</span>`;
  if(ik.transport_proto)h+=`<span class="k">Протокол</span><span class="v">${esc(ik.transport_proto)}</span>`;
  h+='</div><div class="warn-block">Учётные данные генерируются на сервере. SSH: <code>docker exec amnezia-ipsec cat /opt/amnezia/ipsec/ipsec.conf</code></div>';
  return h;
}

function exportAllVless(){
  const uris=[];
  for(const srv of allServers)
    for(const c of(srv.containers||[]))
      if(c.container==='amnezia-xray'){
        let cfg=null;try{cfg=JSON.parse((c.xray||{}).last_config);}catch(e){}
        if(cfg){const uri=buildVlessUri(cfg,srv,!!(srv.api_config||{}).vpn_key);if(uri)uris.push(uri);}
      }
  if(!uris.length){showToast('Нет VLESS для экспорта','err');return;}
  download('all_vless.txt',uris.join('\n'));
  showToast('Экспортировано '+uris.length+' VLESS URI');
}

function showCfgModal(title,safeText){
  const text=safeText.replace(/\\n/g,'\n');
  const sa=safeText.replace(/'/g,"\\'");
  const body=`<textarea class="cfg-area" readonly>${esc(text)}</textarea>
    <div class="act-row" style="margin-top:.65rem">
      <button class="btn pr" onclick="copyStr('${sa}','${esc(title)}')">Копировать</button>

function openModal(title,body){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-bd').innerHTML=body;
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(){
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow='';
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

function switchPtTab(btn,pid){
  const scope=btn.closest('.srv-panel,.server-card');
  scope.querySelectorAll('.pt-tab').forEach(b=>b.classList.remove('act'));
  scope.querySelectorAll('.pt-panel').forEach(p=>p.classList.remove('act'));
  btn.classList.add('act');
  document.getElementById(pid).classList.add('act');
}
function switchSrvTab(btn,pid){
  const card=btn.closest('.server-card');
  card.querySelectorAll('.srv-tab').forEach(b=>b.classList.remove('act'));
  card.querySelectorAll('.srv-panel').forEach(p=>p.classList.remove('act'));
  btn.classList.add('act');
  document.getElementById(pid).classList.add('act');
}
function switchRTab(btn,pid){
  const box=btn.closest('.modal-bd');
  box.querySelectorAll('.r-tab').forEach(b=>b.classList.remove('act'));
  box.querySelectorAll('.r-panel').forEach(p=>p.classList.remove('act'));
  btn.classList.add('act');
  document.getElementById(pid).classList.add('act');
}

function showErr(msg){errEl.textContent=msg;errEl.style.display='block';}

function copyStr(safe,label){
  const text=safe.replace(/\\n/g,'\n');
  if(navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(()=>showToast(label+' скопирован')).catch(()=>fallbackCopy(text,label));
  } else {
    fallbackCopy(text,label);
  }
}
function fallbackCopy(text,label){
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.setAttribute('readonly', '');
  ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try {
    document.execCommand('copy');
    showToast(label+' скопирован');
  } catch(e) {
    showToast('Ошибка копирования', 'err');
  }
  document.body.removeChild(ta);
}

function dlStr(filename,safe){
  const text=safe.replace(/\\n/g,'\n');
  download(filename,text);
}
function download(filename,text){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([text],{type:'application/octet-stream'}));
  a.download=filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

function showToast(msg,type=''){
  const wrap=document.getElementById('toasts');
  const el=document.createElement('div');
  el.className='toast'+(type?' '+type+'-t':'');
  el.textContent=msg;
  wrap.appendChild(el);
  requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.add('show')));
  setTimeout(()=>{el.classList.remove('show');setTimeout(()=>el.remove(),300);},2200);
}

window.addEventListener('scroll', ()=>{
  const b=document.getElementById('btt');
  if(window.scrollY>250) b.classList.add('show');
  else b.classList.remove('show');
});

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function encCfg(txt){return txt.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n');}

function flag(code){
  if(!code||code.length<2)return'';
  try{return[...code.slice(0,2).toUpperCase()].map(c=>String.fromCodePoint(127397+c.charCodeAt(0))).join('');}
  catch(e){return'';}
}

function stripEmoji(str){if(!str)return'';return str.replace(/^[^\p{L}\p{N}\[\(]+/gu,'').trim();}

function fmtDate(s){return new Date(s).toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric'});}

function trimFn(s){return s.replace(/\.backup$/i,'').slice(-14);}
